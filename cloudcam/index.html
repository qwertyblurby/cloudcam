<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cloudcam compositor</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #07090d;
        overflow: hidden;
      }

      #output-canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        object-fit: cover;
      }

      #ui-root {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <video id="webcam-source" autoplay playsinline muted hidden></video>
    <canvas id="output-canvas" width="1280" height="720"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
