<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloudcam Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #07090d;
        --header-bg: rgba(255, 255, 255, 0.95);
        --header-border: rgba(14, 165, 233, 0.2);
        --header-text-color: #030213;
        --clip-count-bg: rgba(14, 165, 233, 0.1);
        --clip-count-color: #0c4a6e;
        --back-link-color: #0ea5e9;
        --back-link-hover-color: #0369a1;
        --card-bg: rgba(255, 255, 255, 0.9);
        --card-border: rgba(14, 165, 233, 0.2);
        --card-hover-shadow: rgba(14, 165, 233, 0.2);
        --clip-title-color: #030213;
        --transform-btn-bg: rgba(255, 255, 255, 0.8);
        --transform-btn-border: rgba(14, 165, 233, 0.2);
        --transform-btn-color: #64748b;
        --transform-btn-hover-bg: rgba(14, 165, 233, 0.1);
        --transform-btn-hover-color: #0c4a6e;
        --action-btn-color: #64748b;
        --action-btn-hover-color: #030213;
        --action-btn-border: rgba(14, 165, 233, 0.2);
        --toggle-bg: rgba(255, 255, 255, 0.8);
        --toggle-border: rgba(14, 165, 233, 0.2);
        --toggle-color: #0c4a6e;
      }

      body.dark {
        --header-bg: rgba(30, 27, 75, 0.95);
        --header-border: rgba(139, 92, 246, 0.3);
        --header-text-color: #e0e7ff;
        --clip-count-bg: rgba(139, 92, 246, 0.15);
        --clip-count-color: #c7d2fe;
        --back-link-color: #a78bfa;
        --back-link-hover-color: #818cf8;
        --card-bg: rgba(30, 27, 75, 0.8);
        --card-border: rgba(139, 92, 246, 0.3);
        --card-hover-shadow: rgba(139, 92, 246, 0.2);
        --clip-title-color: #e0e7ff;
        --transform-btn-bg: rgba(49, 46, 129, 0.8);
        --transform-btn-border: rgba(139, 92, 246, 0.3);
        --transform-btn-color: #94a3b8;
        --transform-btn-hover-bg: rgba(139, 92, 246, 0.15);
        --transform-btn-hover-color: #c7d2fe;
        --action-btn-color: #94a3b8;
        --action-btn-hover-color: #e0e7ff;
        --action-btn-border: rgba(139, 92, 246, 0.3);
        --toggle-bg: rgba(30, 27, 75, 0.8);
        --toggle-border: rgba(139, 92, 246, 0.3);
        --toggle-color: #c7d2fe;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Rubik', sans-serif;
        background: var(--bg-color);
        color: var(--header-text-color);
        min-height: 100vh;
        transition: background 0.3s ease, color 0.3s ease;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        border-bottom: 1px solid var(--header-border);
        background: var(--header-bg);
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(10px);
      }

      h1 {
        font-size: 24px;
        font-weight: 700;
        color: var(--header-text-color);
        font-family: 'Rubik', sans-serif;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      #clip-count {
        background: var(--clip-count-bg);
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        color: var(--clip-count-color);
        font-family: 'Rubik', sans-serif;
        font-weight: 500;
      }

      .back-link {
        color: var(--back-link-color);
        text-decoration: none;
        font-size: 14px;
        transition: color 0.2s;
        font-family: 'Rubik', sans-serif;
        font-weight: 500;
      }

      .back-link:hover {
        color: var(--back-link-hover-color);
      }

      .theme-toggle {
        padding: 8px 16px;
        background: var(--toggle-bg);
        border: 1px solid var(--toggle-border);
        border-radius: 9999px;
        color: var(--toggle-color);
        font-family: 'Rubik', sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s ease;
      }

      .theme-toggle:hover {
        transform: scale(1.05);
      }

      #gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 24px;
        padding: 40px;
        max-width: 1600px;
        margin: 0 auto;
      }

      .clip-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        overflow: hidden;
        backdrop-filter: blur(10px);
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .clip-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 24px var(--card-hover-shadow);
      }

      .clip-thumbnail {
        position: relative;
        aspect-ratio: 16 / 9;
        background: #000;
        overflow: hidden;
      }

      .preview-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 1;
      }

      .duration-badge {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 700;
        font-family: 'Rubik', sans-serif;
      }

      .play-preview-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.6);
        border: 2px solid rgba(255, 255, 255, 0.8);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        backdrop-filter: blur(4px);
      }

      .play-preview-btn:hover {
        background: rgba(0, 0, 0, 0.8);
        transform: translate(-50%, -50%) scale(1.1);
        border-color: #fff;
      }

      .clip-thumbnail:hover .play-preview-btn {
        opacity: 1;
      }

      .clip-thumbnail.playing .play-preview-btn {
        opacity: 0;
      }

      .clip-info {
        padding: 16px;
      }

      .clip-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--clip-title-color);
        margin-bottom: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-family: 'Rubik', sans-serif;
      }

      .transform-buttons {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .transform-btn {
        padding: 6px 10px;
        border: 1px solid var(--transform-btn-border);
        border-radius: 6px;
        background: var(--transform-btn-bg);
        color: var(--transform-btn-color);
        font-family: 'Rubik', sans-serif;
        font-size: 10px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }

      .transform-btn:hover {
        background: var(--transform-btn-hover-bg);
        border-color: var(--back-link-color);
        color: var(--transform-btn-hover-color);
      }

      .clip-actions {
        display: flex;
        gap: 8px;
        border-top: 1px solid var(--card-border);
        padding-top: 12px;
      }

      .action-btn {
        flex: 1;
        padding: 8px;
        border: 1px solid var(--action-btn-border);
        border-radius: 6px;
        background: transparent;
        color: var(--action-btn-color);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        font-family: 'Rubik', sans-serif;
        font-size: 12px;
        font-weight: 500;
      }

      .action-btn:hover {
        background: rgba(255, 255, 255, 0.05);
        color: var(--action-btn-hover-color);
      }

      .copy-btn:hover {
        border-color: var(--back-link-color);
        color: var(--back-link-color);
      }

      .delete-btn:hover {
        border-color: #ef4444;
        color: #ef4444;
      }

      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Cloudcam Gallery</h1>
      <div class="header-right">
        <span id="clip-count">0 clips published</span>
        <button class="theme-toggle" id="theme-toggle">
          <span id="theme-icon">🌙</span>
          <span id="theme-text">Dark</span>
        </button>
        <a href="camera.html" class="back-link">Back to studio →</a>
      </div>
    </header>

    <div id="gallery-grid"></div>

    <script>
      const themeToggle = document.getElementById('theme-toggle');
      const themeIcon = document.getElementById('theme-icon');
      const themeText = document.getElementById('theme-text');

      function setTheme(isDark) {
        document.body.classList.toggle('dark', isDark);
        themeIcon.textContent = isDark ? '☀️' : '🌙';
        themeText.textContent = isDark ? 'Light' : 'Dark';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      }

      themeToggle.addEventListener('click', () => {
        const isDark = !document.body.classList.contains('dark');
        setTheme(isDark);
      });

      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        setTheme(true);
      }
    </script>
    <script type="module" src="/src/gallery.js"></script>
  </body>
</html>
